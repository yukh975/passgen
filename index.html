<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <link rel="icon" href="favicon.ico" sizes="48x48">
    <link rel="icon" type="image/svg+xml" href="assets/logo.svg">
    <link rel="stylesheet" href="assets/style.css">
    <script src="assets/theme-init.js"></script>
</head>
<body>
    <div class="container">

        <div class="page-header">
            <div class="title-row">
                <img src="assets/logo.svg" alt="Passgen logo" class="site-logo">
                <div>
                    <h1 data-i18n="app_title"></h1>
                    <p class="subtitle" data-i18n-html="subtitle"></p>
                </div>
            </div>
            <div class="lang-switcher">
                <button type="button" id="theme-btn" class="theme-btn"></button>
                <span class="lang-sep">|</span>
                <button type="button" id="reset-btn" class="help-btn" data-i18n-title="reset_title">↺</button>
                <span class="lang-sep">|</span>
                <button type="button" id="help-btn" class="help-btn" data-i18n-title="help_title">?</button>
                <span class="lang-sep">|</span>
                <button type="button" id="lang-en" class="lang-btn">EN</button>
                <span class="lang-sep">|</span>
                <button type="button" id="lang-ru" class="lang-btn">RU</button>
            </div>
        </div>

        <!-- =====================================================
             App content goes here
             ===================================================== -->

        <main id="app-content">
            <div class="gen-card">

                <!-- Tabs -->
                <div class="gen-tabs">
                    <button type="button" class="gen-tab active" data-tab="password" data-i18n="tab_password"></button>
                    <button type="button" class="gen-tab" data-tab="passphrase" data-i18n="tab_passphrase"></button>
                    <button type="button" class="gen-tab" data-tab="pin" data-i18n="tab_pin"></button>
                    <button type="button" class="gen-tab" data-tab="ssh" data-i18n="tab_ssh"></button>
                </div>

                <!-- ── Password ──────────────────────────────────────── -->
                <div id="panel-password" class="gen-panel">

                    <div class="gen-row">
                        <label class="gen-label" data-i18n="length_label"></label>
                        <div class="slider-row">
                            <input type="range" id="pw-length-range" min="4" max="64" value="20" class="slider-input">
                            <input type="number" id="pw-length-num" min="4" max="64" value="20" class="num-input">
                        </div>
                    </div>

                    <div class="gen-row">
                        <label class="gen-label" data-i18n="options_label"></label>
                        <div class="opts-grid">
                            <label class="toggle-row"><input type="checkbox" id="pw-upper" checked><span class="toggle-label" data-i18n="opt_uppercase"></span></label>
                            <label class="toggle-row"><input type="checkbox" id="pw-lower" checked><span class="toggle-label" data-i18n="opt_lowercase"></span></label>
                            <label class="toggle-row"><input type="checkbox" id="pw-numbers" checked><span class="toggle-label" data-i18n="opt_numbers"></span></label>
                            <label class="toggle-row"><input type="checkbox" id="pw-symbols" checked><span class="toggle-label" data-i18n="opt_symbols"></span></label>
                            <label class="toggle-row"><input type="checkbox" id="pw-nosimilar"><span class="toggle-label" data-i18n="opt_nosimilar"></span></label>
                            <label class="toggle-row"><input type="checkbox" id="pw-norepeat"><span class="toggle-label" data-i18n="opt_norepeat"></span></label>
                        </div>
                    </div>

                    <div class="gen-row-split">
                        <div class="gen-field">
                            <label class="gen-label" data-i18n="custom_symbols_label"></label>
                            <input type="text" id="pw-custom" placeholder="@#$">
                        </div>
                        <div class="gen-field">
                            <label class="gen-label" data-i18n="exclude_label"></label>
                            <input type="text" id="pw-exclude" placeholder="&apos;&quot;;&lt;&gt;">
                        </div>
                    </div>

                    <div class="gen-row-split">
                        <div class="gen-field">
                            <label class="gen-label" data-i18n="preset_label"></label>
                            <select id="pw-preset">
                                <option value="" data-i18n="preset_none"></option>
                                <option value="postgresql">PostgreSQL</option>
                                <option value="mysql">MySQL</option>
                                <option value="sqlserver">SQL Server</option>
                                <option value="linux">Linux User</option>
                                <option value="windows">Windows Admin</option>
                                <option value="redis">Redis</option>
                                <option value="rabbitmq">RabbitMQ</option>
                                <option value="highentropy" data-i18n="preset_high_entropy"></option>
                            </select>
                        </div>
                        <div class="gen-field">
                            <label class="gen-label" data-i18n="count_label"></label>
                            <div class="slider-row">
                                <input type="range" id="pw-count-range" min="1" max="50" value="1" class="slider-input">
                                <input type="number" id="pw-count-num" min="1" max="50" value="1" class="num-input">
                            </div>
                        </div>
                    </div>

                    <div class="result-area">
                        <div class="strength-row">
                            <span class="strength-label" data-i18n="strength_label"></span>
                            <div class="strength-bar" id="pw-strength-bar">
                                <div class="strength-seg" data-n="1"></div>
                                <div class="strength-seg" data-n="2"></div>
                                <div class="strength-seg" data-n="3"></div>
                                <div class="strength-seg" data-n="4"></div>
                                <div class="strength-seg" data-n="5"></div>
                            </div>
                            <span class="strength-text" id="pw-strength-text"></span>
                        </div>
                        <div id="pw-result-list" class="pw-result-list"></div>
                        <div class="pw-actions">
                            <button type="button" id="pw-copy-all" class="result-action-btn secondary" data-i18n="btn_copy_all"></button>
                            <button type="button" id="pw-regen" class="result-action-btn" data-i18n="btn_regen"></button>
                        </div>
                    </div>

                </div>

                <!-- ── Passphrase ──────────────────────────────────── -->
                <div id="panel-passphrase" class="gen-panel hidden">

                    <div class="gen-row-split">
                        <div class="gen-field">
                            <label class="gen-label" data-i18n="word_count_label"></label>
                            <div class="slider-row">
                                <input type="range" id="pp-count-range" min="2" max="10" value="8" class="slider-input">
                                <input type="number" id="pp-count-num" min="2" max="10" value="8" class="num-input">
                            </div>
                        </div>
                        <div class="gen-field">
                            <label class="gen-label" data-i18n="count_label"></label>
                            <div class="slider-row">
                                <input type="range" id="pp-qty-range" min="1" max="50" value="1" class="slider-input">
                                <input type="number" id="pp-qty-num" min="1" max="50" value="1" class="num-input">
                            </div>
                        </div>
                    </div>

                    <div class="gen-row">
                        <label class="gen-label" data-i18n="options_label"></label>
                        <div class="opts-grid">
                            <label class="toggle-row"><input type="checkbox" id="pp-capitalize"><span class="toggle-label" data-i18n="opt_capitalize"></span></label>
                            <label class="toggle-row"><input type="checkbox" id="pp-random-cap"><span class="toggle-label" data-i18n="opt_random_cap"></span></label>
                            <label class="toggle-row"><input type="checkbox" id="pp-num-start"><span class="toggle-label" data-i18n="opt_num_start"></span></label>
                            <label class="toggle-row"><input type="checkbox" id="pp-num-end"><span class="toggle-label" data-i18n="opt_num_end"></span></label>
                            <label class="toggle-row"><input type="checkbox" id="pp-num-inner"><span class="toggle-label" data-i18n="opt_num_inner"></span></label>
                        </div>
                    </div>

                    <div class="gen-row">
                        <label class="gen-label" data-i18n="separator_label"></label>
                        <select id="pp-separator">
                            <option value="space" data-i18n="sep_space"></option>
                            <option value="dash" selected data-i18n="sep_dash"></option>
                            <option value="dot" data-i18n="sep_dot"></option>
                            <option value="underscore" data-i18n="sep_underscore"></option>
                            <option value="random" data-i18n="sep_random"></option>
                            <option value="none" data-i18n="sep_none"></option>
                        </select>
                    </div>

                    <div class="result-area">
                        <div id="pp-result-list" class="pw-result-list"></div>
                        <div class="pw-actions">
                            <button type="button" id="pp-copy-all" class="result-action-btn secondary" data-i18n="btn_copy_all"></button>
                            <button type="button" id="pp-regen" class="result-action-btn" data-i18n="btn_regen"></button>
                        </div>
                    </div>

                </div>

                <!-- ── PIN ────────────────────────────────────────── -->
                <div id="panel-pin" class="gen-panel hidden">

                    <div class="gen-row-split">
                        <div class="gen-field">
                            <label class="gen-label" data-i18n="length_label"></label>
                            <div class="slider-row">
                                <input type="range" id="pin-length-range" min="4" max="12" value="6" class="slider-input">
                                <input type="number" id="pin-length-num" min="4" max="12" value="6" class="num-input">
                            </div>
                        </div>
                        <div class="gen-field">
                            <label class="gen-label" data-i18n="count_label"></label>
                            <div class="slider-row">
                                <input type="range" id="pin-qty-range" min="1" max="50" value="1" class="slider-input">
                                <input type="number" id="pin-qty-num" min="1" max="50" value="1" class="num-input">
                            </div>
                        </div>
                    </div>

                    <div class="result-area">
                        <div id="pin-result-list" class="pw-result-list"></div>
                        <div class="pw-actions">
                            <button type="button" id="pin-copy-all" class="result-action-btn secondary" data-i18n="btn_copy_all"></button>
                            <button type="button" id="pin-regen" class="result-action-btn" data-i18n="btn_regen"></button>
                        </div>
                    </div>

                </div>

                <!-- ── SSH Key ───────────────────────────────────────── -->
                <div id="panel-ssh" class="gen-panel hidden">

                    <div class="gen-row-split">
                        <div class="gen-field">
                            <label class="gen-label" data-i18n="ssh_type_label"></label>
                            <select id="ssh-type">
                                <option value="ed25519">ED25519</option>
                                <option value="rsa">RSA</option>
                            </select>
                        </div>
                        <div class="gen-field" id="ssh-bits-field">
                            <label class="gen-label" data-i18n="ssh_bits_label"></label>
                            <select id="ssh-bits">
                                <option value="2048">2048 bits</option>
                                <option value="3072">3072 bits</option>
                                <option value="4096" selected>4096 bits</option>
                            </select>
                        </div>
                    </div>

                    <div class="result-area">
                        <div id="ssh-result" class="ssh-result"></div>
                        <div class="ssh-footer">
                            <div class="ssh-footer-side"></div>
                            <div class="ssh-actions">
                                <button type="button" id="ssh-generate"    class="ssh-btn"           data-i18n="btn_generate"></button>
                                <button type="button" id="ssh-verify-open" class="ssh-btn"           data-i18n="btn_verify_key"></button>
                                <button type="button" id="ssh-clear"       class="ssh-btn ssh-btn--muted" data-i18n="btn_clear"></button>
                            </div>
                            <div class="ssh-footer-side ssh-footer-right">
                                <button type="button" id="ssh-download" class="ssh-btn ssh-btn--muted hidden" data-i18n="btn_download_zip"></button>
                            </div>
                        </div>
                    </div>

                </div>

            </div>
        </main>

        <!-- Error toast -->
        <div id="error-backdrop" class="error-backdrop hidden"></div>
        <div id="error" class="error hidden">
            <span id="error-text"></span>
            <button type="button" id="error-close" class="error-close">✕</button>
        </div>

        <!-- Help modal -->
        <div id="help" class="help-modal hidden">
            <div class="help-header">
                <span data-i18n="help_title"></span>
                <div class="help-header-right">
                    <div class="lang-switcher">
                        <button type="button" id="help-lang-en" class="lang-btn">EN</button>
                        <span class="lang-sep">|</span>
                        <button type="button" id="help-lang-ru" class="lang-btn">RU</button>
                    </div>
                    <button type="button" id="help-close" class="result-close">✕</button>
                </div>
            </div>
            <div class="help-body" id="help-body" data-i18n-html="help_content"></div>
        </div>

        <!-- Verify SSH Key Pair modal -->
        <div id="ssh-verify-modal" class="ssh-verify-modal hidden">
            <div class="ssh-verify-hdr">
                <span data-i18n="ssh_verify_title"></span>
                <button type="button" id="ssh-verify-close" class="result-close">✕</button>
            </div>
            <div class="ssh-verify-body">
                <div class="ssh-verify-field">
                    <div class="ssh-verify-field-hdr">
                        <span class="gen-label" data-i18n="ssh_private_label"></span>
                        <label class="ssh-upload-btn">
                            <input type="file" id="ssh-verify-priv-file" style="display:none" accept=".key,.pem,.txt,text/plain">
                            <span data-i18n="btn_upload_file"></span>
                        </label>
                    </div>
                    <textarea id="ssh-verify-priv" class="ssh-key-textarea" rows="6" spellcheck="false" data-i18n-placeholder="ssh_verify_priv_ph"></textarea>
                </div>
                <div class="ssh-verify-field">
                    <div class="ssh-verify-field-hdr">
                        <span class="gen-label" data-i18n="ssh_public_label"></span>
                        <label class="ssh-upload-btn">
                            <input type="file" id="ssh-verify-pub-file" style="display:none" accept=".pub,.txt,text/plain">
                            <span data-i18n="btn_upload_file"></span>
                        </label>
                    </div>
                    <textarea id="ssh-verify-pub" class="ssh-key-textarea" rows="3" spellcheck="false" data-i18n-placeholder="ssh_verify_pub_ph"></textarea>
                </div>
                <div id="ssh-verify-result" class="ssh-verify-result hidden"></div>
                <div class="pw-actions">
                    <button type="button" id="ssh-verify-check" class="result-action-btn" data-i18n="btn_verify"></button>
                </div>
            </div>
        </div>

        <!-- Copy-all modal -->
        <div id="copy-all-modal" class="copy-all-modal hidden">
            <div class="copy-all-header">
                <span data-i18n="copy_all_title"></span>
                <button type="button" id="copy-all-close" class="result-close">✕</button>
            </div>
            <div class="copy-all-body">
                <textarea id="copy-all-text" class="copy-all-text" readonly></textarea>
                <button type="button" id="copy-all-btn" class="result-action-btn" data-i18n="btn_copy"></button>
            </div>
        </div>

        <footer class="copyright">
            <div>© 2026 Yuriy Khachaturian</div>
            <div>v1.0.1-devel</div>
        </footer>

    </div>

    <script src="assets/wordlist.js"></script>
    <script src="assets/translations.js"></script>
    <script src="assets/app.js"></script>
</body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- background -->
  <rect width="48" height="48" rx="10" fill="#0d1117"/>

  <!-- lock body -->
  <rect x="13" y="22" width="22" height="16" rx="3" fill="none" stroke="#58a6ff" stroke-width="2.4"/>

  <!-- lock shackle -->
  <path d="M17 22v-5a7 7 0 0 1 14 0v5" fill="none" stroke="#58a6ff" stroke-width="2.4" stroke-linecap="round"/>

  <!-- keyhole -->
  <circle cx="24" cy="30" r="2.5" fill="#58a6ff"/>
  <rect x="22.8" y="30" width="2.4" height="4" rx="1" fill="#58a6ff"/>

  <!-- 4 corner dots -->
  <circle cx="6"  cy="6"  r="1.8" fill="#58a6ff"/>
  <circle cx="42" cy="6"  r="1.8" fill="#58a6ff"/>
  <circle cx="6"  cy="42" r="1.8" fill="#58a6ff"/>
  <circle cx="42" cy="42" r="1.8" fill="#58a6ff"/>
</svg>
